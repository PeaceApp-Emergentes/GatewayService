spring.application.name=gateway-service
server.port=${GATEWAY_SERVICE_PORT:8080}
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
spring.cloud.gateway.routes[0].id=iam-service-route
spring.cloud.gateway.routes[0].uri=lb://iam-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/authentication/**
spring.cloud.gateway.routes[1].id=alert-service-route
spring.cloud.gateway.routes[1].uri=lb://alert-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/alerts/**
spring.cloud.gateway.routes[2].id=report-service-route
spring.cloud.gateway.routes[2].uri=lb://report-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/reports/**
spring.cloud.gateway.routes[3].id=user-service-route
spring.cloud.gateway.routes[3].uri=lb://user-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/users/**
spring.cloud.gateway.routes[4].id=location-service-route
spring.cloud.gateway.routes[4].uri=lb://location-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/locations/**
spring.cloud.gateway.routes[5].id=profiles-service-route
spring.cloud.gateway.routes[5].uri=lb://user-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/profiles/**
spring.cloud.gateway.routes[6].id=alert-service-websocket-route
spring.cloud.gateway.routes[6].uri=lb:ws://alert-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/ws/alerts
spring.cloud.gateway.routes[7].id=ai-service-route
spring.cloud.gateway.routes[7].uri=lb://ai-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/ai/**
spring.cloud.gateway.routes[8].id=payment-service-route
spring.cloud.gateway.routes[8].uri=lb://payment-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/payments/**
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=INFO
